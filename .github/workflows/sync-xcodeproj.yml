name: Sync Generated Xcode Project

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "native-ios/project.yml"
      - "native-ios/NaviLive/**"
      - ".github/workflows/sync-xcodeproj.yml"

permissions:
  contents: write

jobs:
  sync-xcodeproj:
    runs-on: macos-15
    concurrency:
      group: navi-live-sync-xcodeproj-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          cd native-ios
          xcodegen generate

      - name: Commit generated xcodeproj if changed
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain -- native-ios/NaviLive.xcodeproj)" ]; then
            echo "No changes in generated xcodeproj."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add native-ios/NaviLive.xcodeproj
          git commit -m "chore(ios): sync generated xcodeproj"
          git push
