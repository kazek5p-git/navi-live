name: iOS Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "native-ios/**"
      - ".github/workflows/ios-unsigned-ipa.yml"

jobs:
  build-unsigned-ipa:
    runs-on: macos-15
    permissions:
      contents: read
    concurrency:
      group: navi-live-ios-unsigned-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode 26 or newer
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import re
          import subprocess
          import sys

          apps = []
          pattern = re.compile(r"Xcode(?:_([0-9]+(?:\.[0-9]+)*))?\.app$")

          for name in os.listdir("/Applications"):
              match = pattern.fullmatch(name)
              if not match:
                  continue
              version_text = match.group(1)
              if not version_text:
                  continue
              parts = tuple(int(part) for part in version_text.split("."))
              apps.append((parts, f"/Applications/{name}"))

          apps.sort()
          selected = None
          for parts, path in apps:
              if parts[0] >= 26:
                  selected = (parts, path)

          if selected is None:
              print("::error::Xcode 26 or newer is not installed on this runner.")
              sys.exit(1)

          version_parts, xcode_path = selected
          developer_dir = f"{xcode_path}/Contents/Developer"
          subprocess.run(["sudo", "xcode-select", "-s", developer_dir], check=True)
          subprocess.run(["xcodebuild", "-version"], check=True)
          subprocess.run(["xcrun", "--sdk", "iphoneos", "--show-sdk-version"], check=True)
          PY

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          cd native-ios
          xcodegen generate

      - name: Build unsigned iOS app
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -project native-ios/NaviLive.xcodeproj \
            -scheme NaviLive \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath native-ios/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            clean build | tee native-ios-build.log

      - name: Package unsigned IPA
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="native-ios/build/Build/Products/Release-iphoneos/NaviLive.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "No app bundle found at $APP_PATH"
            exit 1
          fi
          rm -rf unsigned-ipa
          mkdir -p unsigned-ipa/Payload
          cp -R "$APP_PATH" unsigned-ipa/Payload/
          (
            cd unsigned-ipa
            zip -qry ../Navi-Live-unsigned.ipa Payload
          )

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v6
        with:
          name: Navi-Live-unsigned-ipa
          path: Navi-Live-unsigned.ipa
          if-no-files-found: error
          retention-days: 7

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: Navi-Live-native-ios-build-log
          path: native-ios-build.log
          if-no-files-found: warn
          retention-days: 7
